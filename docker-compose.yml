services:
  # Servicio 1: Selenium con Chrome
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    platform: linux/amd64    # ← agregar esta línea
    container_name: selenium-chrome
    shm_size: 2g
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  # Servicio 2: Tus tests
  sdet-tests:
    build: .   # Construye usando el Dockerfile de esta carpeta
    container_name: sdet-tests
    depends_on:
      selenium-chrome:
        condition: service_started
    environment:
      - SELENIUM_REMOTE_URL=http://selenium-chrome:4444/wd/hub
      - ENV=${ENV:-tst}   # Toma de variable de entorno, default "tst"
    command: mvn test -Denv=${ENV:-tst}
    volumes:
      - ./target:/app/target   # Para sacar los resultados de Allure